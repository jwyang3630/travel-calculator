// ── 환율 ──────────────────────────────
let KRW=1530;
async function fetchRate(){
  try{
    const r=await fetch('https://open.er-api.com/v6/latest/USD');
    const j=await r.json();
    if(j.rates?.KRW){
      KRW=Math.round(j.rates.KRW);
      const updated=j.time_last_update_utc?j.time_last_update_utc.slice(0,16):'';
      document.getElementById('rate-bar').innerHTML=
        `💱 실시간 환율 <strong>1 USD = ₩${KRW.toLocaleString()}</strong> <span class="rate-live">실시간</span> · 업데이트: ${updated}`;
      render();
      return;
    }
  }catch{}
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');
    const j=await r.json();
    if(j.rates?.KRW){
      KRW=Math.round(j.rates.KRW);
      document.getElementById('rate-bar').innerHTML=
        `💱 실시간 환율 <strong>1 USD = ₩${KRW.toLocaleString()}</strong> <span class="rate-live">실시간</span> · 기준일: ${j.date}`;
      render();
      return;
    }
  }catch{}
  document.getElementById('rate-bar').innerHTML=
    `💱 환율 <strong>1 USD = ₩${KRW.toLocaleString()}</strong> <span class="rate-fallback">네트워크 오류 · 기준값 사용 중</span>`;
}

// ── 계산 ──────────────────────────────
const w=krw=>'₩'+Math.round(krw).toLocaleString();

function calcKRW(c,s,d,pax,peakOn){
  const pm = peakOn ? PEAK_MULT[c.name] : {flight:1,hotel:1};
  const fl=c.flight[s]*pm.flight*pax;
  const rm=Math.ceil(pax/2);
  const nights=Math.max(d-1,1);
  const ho=c.hotel[s]*pm.hotel*nights*rm;
  const fo=c.food[s]*d*pax;
  const tr=c.transport[s]*d*pax;
  return Math.round((fl+ho+fo+tr)*KRW);
}

function cityCard(c,mainPrice,subLabel,subPrice,extra){
  const hoLink=TRIP_HOTEL[c.name]||'https://www.trip.com';
  const agLink=AGODA_HOTEL[c.name]||'https://www.agoda.com';
  const flLink=TRIP_FLIGHT[c.name]||'https://www.trip.com';
  return `<div class="city-card">
    <div class="city-card-top">
      <div>
        <div class="city-name">${c.flag} ${c.name}</div>
        <div class="city-country">${c.country}</div>
      </div>
    </div>
    <div class="price-row">
      <div class="price-block price-off"><div class="pl">비수기</div><div class="pv">${w(mainPrice)}</div></div>
      <div class="price-block price-peak"><div class="pl">${subLabel}</div><div class="pv">${w(subPrice)}</div></div>
    </div>
    <div class="peak-season-label">🗓️ 성수기: ${PEAK_LABEL[c.name]}</div>
    ${extra||''}
    <div class="city-actions">
      <a href="${hoLink}" target="_blank" class="btn-trip">🏨 트립닷컴</a>
      <a href="${agLink}" target="_blank" class="btn-agoda">🏨 아고다</a>
      <a href="${flLink}" target="_blank" class="btn-flight">✈️ 항공권</a>
    </div>
  </div>`;
}

function render(){
  const budget=parseInt(document.getElementById('budget').value)||0;
  const d=parseInt(document.getElementById('days').value)||4;
  const pax=parseInt(document.getElementById('pax').value)||1;
  const s=parseInt(document.getElementById('style').value);
  const rEl=document.getElementById('result');

  if(budget<=0){ rEl.innerHTML='<p class="empty-msg">예산을 입력해주세요 💰</p>'; return; }

  const rows=CITIES.map(c=>{
    const off=calcKRW(c,s,d,pax,false);
    const peak=calcKRW(c,s,d,pax,true);
    return {...c, off, peak};
  });

  const always = rows.filter(r=>r.peak<=budget).sort((a,b)=>a.peak-b.peak);
  const timing = rows.filter(r=>r.off<=budget && r.peak>budget).sort((a,b)=>a.off-b.off);
  const short  = rows.filter(r=>r.off>budget).sort((a,b)=>a.off-b.off).slice(0,3);

  let h='';

  h+=`<div class="group-header group-always"><span class="gtitle">✅ 언제 가도 OK (성수기도 예산 안)</span><span class="gcount">${always.length}곳</span></div>`;
  h+=`<div class="group-desc">${totPaxLabel(pax)}·${d}일 기준, 성수기에 가도 예산 안에 들어와요</div>`;
  h += always.length
    ? always.map(c=>cityCard(c,c.off,'성수기',c.peak)).join('')
    : `<p class="empty-msg">이 예산으로 성수기까지 여유로운 곳은 아직 없어요</p>`;

  h+=`<div class="group-header group-timing"><span class="gtitle">🔥 시기만 잘 맞추면 (비수기 한정)</span><span class="gcount">${timing.length}곳</span></div>`;
  h+=`<div class="group-desc">성수기엔 예산 초과지만, 비수기에 가면 딱 맞아요</div>`;
  h += timing.length
    ? timing.map(c=>{
        const diff = c.peak - budget;
        return cityCard(c,c.off,'성수기',c.peak,`<div class="short-diff">⚠️ 성수기엔 예산보다 ${w(diff)} 더 필요해요</div>`);
      }).join('')
    : `<p class="empty-msg">해당하는 여행지가 없어요</p>`;

  h+=`<div class="group-header group-short"><span class="gtitle">❌ 이 예산으론 아직 부족해요</span><span class="gcount">가까운 순 3곳</span></div>`;
  h+=`<div class="group-desc">조금만 더 모으면 갈 수 있는 곳들이에요</div>`;
  h += short.length
    ? short.map(c=>{
        const diff = c.off - budget;
        return cityCard(c,c.off,'성수기',c.peak,`<div class="short-diff">💪 ${w(diff)}만 더 모으면 비수기에 갈 수 있어요</div>`);
      }).join('')
    : `<p class="empty-msg">모든 여행지가 예산 안에 들어와요! 🎉</p>`;

  rEl.innerHTML=h;
}

function totPaxLabel(pax){ return `${pax}인`; }

// ── 예산 프리셋 칩 ──────────────────────
const PRESETS=[300000,500000,800000,1000000,1500000,2000000];
const chipRow=document.getElementById('chip-row');
PRESETS.forEach(v=>{
  const btn=document.createElement('button');
  btn.className='chip';
  btn.textContent=(v/10000)+'만원';
  btn.onclick=()=>{
    document.getElementById('budget').value=v;
    [...chipRow.children].forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  chipRow.appendChild(btn);
});

['budget','days','pax','style'].forEach(id=>{
  document.getElementById(id).addEventListener('input',render);
  document.getElementById(id).addEventListener('change',render);
});

fetchRate();
render();
</script>
